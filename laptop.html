<!DOCTYPE html>
<html>
<head>
    <title>Laptop Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<h2>Laptop Price Prediction</h2>

<form action="/predict_laptop" method="post">

Company:
<select name="Company">
{% for c in companies %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select><br><br>

Type:
<select name="TypeName">
{% for t in types %}
<option value="{{t}}">{{t}}</option>
{% endfor %}
</select><br><br>

RAM:
<input type="number" name="Ram"><br><br>

Weight:
<input type="number" step="0.01" name="Weight"><br><br>

Touchscreen:
<select name="Touchscreen">
<option value="1">Yes</option>
<option value="0">No</option>
</select><br><br>

IPS Display:
<select name="Ips">
<option value="1">Yes</option>
<option value="0">No</option>
</select><br><br>

PPI:
<input type="number" step="0.01" name="PPI"><br><br>

CPU Brand:
<select name="Cpu_brand">
{% for c in cpu %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select><br><br>

HDD:
<input type="number" name="HDD"><br><br>

SSD:
<input type="number" name="SSD"><br><br>

GPU Brand:
<select name="Gpu_brand">
{% for g in gpu %}
<option value="{{g}}">{{g}}</option>
{% endfor %}
</select><br><br>

Operating System:
<select name="OS">
{% for o in os %}
<option value="{{o}}">{{o}}</option>
{% endfor %}
</select><br><br>

<button type="submit">Predict Price</button>
<div class="container">
    <h1>Car Price Prediction</h1>
    <form method="POST" action="/predict_car">
        ...
        <button type="submit" class="btn">Predict Price</button>
    </form>
</div>

</form>

</body>
</html>
